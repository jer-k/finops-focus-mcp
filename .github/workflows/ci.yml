name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint:fix

      - name: Test
        run: npm test

      - name: Generate focus docs
        run: npm run generate

      - name: Check generated files are up to date
        run: |
          git diff --exit-code -- 'src/focus/**/*.jsonc' 'src/focus/**/*.md' \
            || (echo "Generated files are out of date. Run 'npm run generate' and commit the result." && exit 1)
